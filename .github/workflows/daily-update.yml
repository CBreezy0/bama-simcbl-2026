name: Daily Data Update

on:
  schedule:
    - cron: '0 10 * * *'   # 6 AM ET every day
  workflow_dispatch:        # allow manual trigger from GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch SimSN data
        run: python scripts/fetch_data.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/alabama.json
          if git diff --cached --quiet; then
            echo "No data changes — skipping commit"
          else
            WEEK=$(python3 -c "import json; d=json.load(open('data/alabama.json')); print(d['week'])")
            REC=$(python3  -c "import json; d=json.load(open('data/alabama.json')); r=d['record']; print(f\"{r['wins']}-{r['losses']}\")")
            git commit -m "Data update: Week ${WEEK}, ${REC} [skip ci]"
            git push
          fi
